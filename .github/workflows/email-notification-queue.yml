name: Email Notification Queue

on:
  schedule:
    - cron: '*/10 * * * *'

  workflow_dispatch:

concurrency:
  group: email-notification-queue
  cancel-in-progress: false

jobs:
  run-email-notification-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Process queued email notification jobs
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_URL:-}" ]; then
            echo "Missing GitHub secret: PROD_URL"
            exit 1
          fi

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing GitHub secret: CRON_SECRET"
            exit 1
          fi

          case "$PROD_URL" in
            http://*|https://*)
              ;;
            *)
              echo "Invalid PROD_URL: must start with http:// or https://"
              exit 1
              ;;
          esac

          BASE_URL="${PROD_URL%/}"

          response=$(curl --silent --show-error --fail-with-body \
            -X GET "${BASE_URL}/api/cron/email-notifications" \
            -H "Authorization: Bearer ${CRON_SECRET}")

          echo "$response"

          success=$(echo "$response" | jq -r '.success // false')

          if [ "$success" != "true" ]; then
            echo "Email notification cron route returned success=false"
            exit 1
          fi
